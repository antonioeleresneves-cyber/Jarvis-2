<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS — Sistema de Inteligência</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & TOKENS ─────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #020c1b;
      --panel:     rgba(0, 20, 42, 0.88);
      --cyan:      #00d4ff;
      --cyan-dim:  #0099bb;
      --cyan-glow: rgba(0, 212, 255, 0.14);
      --green:     #00ff88;
      --amber:     #ffb400;
      --orange:    #ff8c00;
      --red:       #ff3c3c;
      --text:      #a8d8f0;
      --text-dim:  #4a7a99;
      --border:    rgba(0, 212, 255, 0.22);
      --font-hud:  'Orbitron', sans-serif;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline sweep */
    body::after {
      content: '';
      position: fixed; top: -4px; left: 0;
      width: 100%; height: 4px;
      background: linear-gradient(transparent, rgba(0,212,255,.4), transparent);
      animation: scanline 8s linear infinite;
      pointer-events: none;
      z-index: 99;
    }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    #header {
      width: 100%;
      text-align: center;
      padding: 30px 0 18px;
      border-bottom: 1px solid var(--border);
    }

    #logo {
      font-family: var(--font-hud);
      font-size: clamp(2rem, 7vw, 3.6rem);
      font-weight: 900;
      letter-spacing: .22em;
      color: var(--cyan);
      animation: logoGlow 3s ease-in-out infinite;
    }

    #tagline {
      font-size: 10px;
      letter-spacing: .36em;
      color: var(--text-dim);
      margin-top: 6px;
      text-transform: uppercase;
    }

    #statusBar {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 14px;
      font-size: 10px;
      letter-spacing: .1em;
      color: var(--text-dim);
    }

    .status-item { display: flex; align-items: center; gap: 6px; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      animation: blinkDot 2s ease-in-out infinite;
    }
    .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
    .dot-amber  { background: var(--amber);  box-shadow: 0 0 6px var(--amber); animation-delay:.4s; }
    .dot-cyan   { background: var(--cyan);   box-shadow: 0 0 6px var(--cyan);  animation-delay:.8s; }

    /* ── ORB SECTION ────────────────────────────────────────── */
    #orbSection {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    #orbWrapper {
      position: relative;
      width: 164px; height: 164px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-ring {
      position: absolute;
      border-radius: 50%;
    }
    .orb-ring:nth-child(1) { width:164px; height:164px; border:1px solid rgba(0,212,255,.12); animation:spinCW  12s linear infinite; }
    .orb-ring:nth-child(2) { width:132px; height:132px; border:1px dashed rgba(0,212,255,.18); animation:spinCCW  8s linear infinite; }
    .orb-ring:nth-child(3) { width:104px; height:104px; border:1px solid rgba(0,212,255,.26); animation:spinCW   5s linear infinite; }

    #orbCore {
      position: relative; z-index: 2;
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      transition: background .3s, border-color .3s, box-shadow .3s;
      /* default — standby */
      background: radial-gradient(circle, rgba(0,212,255,.16) 0%, rgba(0,20,40,.9) 100%);
      border: 2px solid var(--cyan);
      box-shadow: 0 0 22px rgba(0,212,255,.45), inset 0 0 16px rgba(0,212,255,.08);
    }

    #orbCore.listening {
      background: radial-gradient(circle, rgba(0,255,136,.22) 0%, rgba(0,28,20,.9) 100%);
      border-color: var(--green);
      box-shadow: 0 0 28px rgba(0,255,136,.65), inset 0 0 16px rgba(0,255,136,.1);
      animation: orbPulse .85s ease-in-out infinite;
    }
    #orbCore.thinking {
      background: radial-gradient(circle, rgba(255,180,0,.16) 0%, rgba(28,20,0,.9) 100%);
      border-color: var(--amber);
      box-shadow: 0 0 22px rgba(255,180,0,.5), inset 0 0 16px rgba(255,180,0,.08);
      animation: orbSpin 1.4s linear infinite;
    }
    #orbCore.speaking {
      background: radial-gradient(circle, rgba(255,140,0,.22) 0%, rgba(28,14,0,.9) 100%);
      border-color: var(--orange);
      box-shadow: 0 0 28px rgba(255,140,0,.6), inset 0 0 16px rgba(255,140,0,.1);
      animation: orbPulse .5s ease-in-out infinite;
    }

    /* ── VISUALIZER ─────────────────────────────────────────── */
    #visualizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 40px;
    }

    .viz-bar {
      width: 4px;
      min-height: 3px;
      border-radius: 2px;
      background: var(--cyan);
      opacity: .3;
      transition: height .1s, opacity .2s, box-shadow .2s;
    }
    .viz-bar.active {
      opacity: .92;
      box-shadow: 0 0 5px var(--viz-color, var(--cyan));
      background: var(--viz-color, var(--cyan));
    }

    /* ── STATE LABEL ────────────────────────────────────────── */
    #stateLabel {
      font-family: var(--font-hud);
      font-size: 10px;
      letter-spacing: .24em;
      padding: 7px 22px;
      border: 1px solid rgba(0,212,255,.3);
      color: var(--cyan);
      background: var(--cyan-glow);
      text-align: center;
      transition: all .3s;
      min-width: 220px;
    }

    /* ── CHAT PANEL ─────────────────────────────────────────── */
    #chatPanel {
      position: relative;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    /* corner brackets */
    #chatPanel::before,
    #chatPanel::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      pointer-events: none;
    }
    #chatPanel::before { top:0; left:0; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
    #chatPanel::after  { bottom:0; right:0; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }

    #panelHeader {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,212,255,.04);
      font-size: 10px;
      letter-spacing: .18em;
      color: var(--cyan);
      text-transform: uppercase;
    }

    .traffic-dot { width:5px; height:5px; border-radius:50%; }

    #chatMessages {
      min-height: 270px;
      max-height: 380px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chatMessages::-webkit-scrollbar { width: 4px; }
    #chatMessages::-webkit-scrollbar-track { background: transparent; }
    #chatMessages::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 2px; }

    /* empty state */
    #emptyState {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: .1em;
      padding: 48px 20px;
    }
    #emptyState .empty-icon { font-size: 34px; opacity: .28; }

    /* messages */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 88%;
      animation: msgIn .28s ease;
    }
    .msg.user   { align-self: flex-end;   align-items: flex-end; }
    .msg.jarvis { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 9px;
      letter-spacing: .2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .msg-bubble {
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.58;
    }
    .msg.user   .msg-bubble {
      background: rgba(0,212,255,.07);
      border: 1px solid rgba(0,212,255,.28);
      color: #cce8f4;
      border-radius: 2px 2px 0 2px;
    }
    .msg.jarvis .msg-bubble {
      background: rgba(0,255,136,.05);
      border: 1px solid rgba(0,255,136,.22);
      color: #b8f4d4;
      border-radius: 2px 2px 2px 0;
    }

    /* data card inside bubble */
    .data-row { line-height: 2; font-size: 12px; }
    .data-key   { color: var(--cyan-dim); }
    .data-val   { color: #e0f7ff; font-weight: bold; }
    .data-empty { color: var(--text-dim); }

    /* typing dots */
    .typing-bubble {
      display: flex;
      gap: 5px;
      padding: 12px 14px;
      background: rgba(0,255,136,.04);
      border: 1px solid rgba(0,255,136,.2);
      border-radius: 2px 2px 2px 0;
      align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }
    .typing-dot:nth-child(1) { animation: blinkDot 1.2s .0s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation: blinkDot 1.2s .2s ease-in-out infinite; }
    .typing-dot:nth-child(3) { animation: blinkDot 1.2s .4s ease-in-out infinite; }

    /* ── INPUT ROW ──────────────────────────────────────────── */
    #inputRow {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: rgba(0,6,16,.5);
    }

    #textInput {
      flex: 1;
      background: rgba(0,212,255,.04);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      border-radius: 2px;
      transition: border-color .2s;
    }
    #textInput:focus { border-color: var(--cyan); }
    #textInput::placeholder { color: var(--text-dim); }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .1em;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 2px;
      transition: all .2s;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: var(--cyan-glow);
    }

    #micBtn {
      border-color: rgba(0,255,136,.3);
      color: var(--green);
    }
    #micBtn:hover, #micBtn.active {
      background: rgba(0,255,136,.1);
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(0,255,136,.28);
    }
    #micBtn.recording {
      background: rgba(0,255,136,.14);
      border-color: var(--green);
      box-shadow: 0 0 18px rgba(0,255,136,.4);
      animation: orbPulse 1s ease-in-out infinite;
    }

    /* ── HINT ───────────────────────────────────────────────── */
    #hint {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .1em;
      text-align: center;
    }
    #hint strong { color: var(--cyan); }

    /* ── TOAST ──────────────────────────────────────────────── */
    #toast {
      position: fixed;
      top: 18px; right: 18px;
      background: rgba(2,12,27,.96);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 10px 18px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .1em;
      z-index: 200;
      box-shadow: 0 0 22px rgba(0,212,255,.2);
      animation: toastIn .3s ease;
      pointer-events: none;
      display: none;
    }

    /* ── KEYFRAMES ──────────────────────────────────────────── */
    @keyframes scanline  { 0%{top:-4px} 100%{top:100%} }
    @keyframes logoGlow  { 0%,100%{text-shadow:0 0 20px rgba(0,212,255,.8),0 0 60px rgba(0,212,255,.4)} 50%{text-shadow:0 0 30px #00d4ff,0 0 80px rgba(0,212,255,.6),0 0 120px rgba(0,212,255,.25)} }
    @keyframes blinkDot  { 0%,100%{opacity:1} 50%{opacity:.25} }
    @keyframes spinCW    { from{transform:rotate(0deg)}   to{transform:rotate(360deg)} }
    @keyframes spinCCW   { from{transform:rotate(0deg)}   to{transform:rotate(-360deg)} }
    @keyframes orbPulse  { 0%,100%{transform:scale(1)}    50%{transform:scale(1.08)} }
    @keyframes orbSpin   { from{transform:rotate(0deg)}   to{transform:rotate(360deg)} }
    @keyframes msgIn     { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastIn   { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }
    @keyframes vizPop    { 0%{height:3px} 50%{height:var(--peak)} 100%{height:3px} }
  </style>
</head>
<body>

<div id="toast"></div>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div id="logo">JARVIS</div>
    <div id="tagline">Just A Rather Very Intelligent System</div>
    <div id="statusBar">
      <span class="status-item"><span class="dot dot-green"></span>SISTEMA ONLINE</span>
      <span class="status-item"><span class="dot dot-amber"></span>IA CONECTADA</span>
      <span class="status-item"><span class="dot dot-cyan"></span>ELEVENLABS ATIVO</span>
    </div>
  </header>

  <!-- ORB -->
  <section id="orbSection">
    <div id="orbWrapper">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div id="orbCore">🤖</div>
    </div>

    <div id="visualizer"></div>

    <div id="stateLabel">STANDBY — DIGA "JARVIS" PARA ATIVAR</div>
  </section>

  <!-- CHAT PANEL -->
  <section id="chatPanel">
    <div id="panelHeader">
      <div class="traffic-dot" style="background:#ff3c3c;box-shadow:0 0 4px #ff3c3c"></div>
      <div class="traffic-dot" style="background:#ffb400;box-shadow:0 0 4px #ffb400"></div>
      <div class="traffic-dot" style="background:#00ff88;box-shadow:0 0 4px #00ff88"></div>
      <span style="margin-left:8px">CONSOLE DE COMUNICAÇÃO — JARVIS v4.1</span>
    </div>

    <div id="chatMessages">
      <div id="emptyState">
        <div class="empty-icon">🎙️</div>
        <div>Diga <strong style="color:var(--cyan)">"Jarvis"</strong> para iniciar</div>
        <div style="font-size:11px;color:var(--text-dim)">ou use o campo de texto abaixo</div>
      </div>
    </div>

    <div id="inputRow">
      <input id="textInput" type="text" placeholder='Digite ou diga "Jarvis"...' autocomplete="off" />
      <button class="btn" id="micBtn" onclick="jarvis.toggleMic()">🎤 MIC</button>
      <button class="btn" onclick="jarvis.sendText()">ENVIAR</button>
    </div>
  </section>

  <p id="hint">Diga <strong>"Jarvis"</strong> para ativar o microfone · Fale normalmente após a ativação</p>

</div>

<script src="jarvis.js"></script>
</body>
</html>
